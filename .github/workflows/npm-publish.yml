name: Publish npm Package

on:
  workflow_run:
    workflows: ["Build Release Binaries"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.4.1)'
        required: true

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.event.workflow_run.head_branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm with OIDC publish support
        run: npm install -g npm@latest

      - name: Sync version from version.txt
        run: node scripts/sync-version.js
        working-directory: npm

      - name: Bundle agents, skills, and hooks
        run: |
          cp -r agents npm/agents
          cp -r skills npm/skills
          cp -r hooks npm/hooks

      - name: Publish to npm with OIDC trusted publishing
        run: npm publish --access public --provenance
        working-directory: npm
