name: Release Please

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - name: Read version
        id: version
        run: echo "version=$(cat version.txt)" >> "$GITHUB_OUTPUT"
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: simple
          release-as: ${{ steps.version.outputs.version }}

  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created || startsWith(github.ref, 'refs/tags/v') }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: konductor-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: konductor-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: konductor-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: konductor-macos-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: konductor-cli

      - name: Upload binary to release
        uses: svenstaro/upload-release-action@v2
        with:
          file: konductor-cli/target/${{ matrix.target }}/release/konductor
          asset_name: ${{ matrix.name }}
          tag: ${{ needs.release-please.outputs.tag_name }}
