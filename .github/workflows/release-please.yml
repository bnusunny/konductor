name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: simple
      - name: Trigger build-release workflow
        if: ${{ steps.release.outputs.release_created }}
        run: gh workflow run build-release.yml -f tag=${{ steps.release.outputs.tag_name }}
        env:
          GH_TOKEN: ${{ github.token }}
