name: Test

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run unit and integration tests
        run: cargo test
        working-directory: konductor-cli

      - name: Run clippy
        run: cargo clippy -- -D warnings
        working-directory: konductor-cli

  e2e:
    runs-on: ubuntu-latest
    if: ${{ vars.KONDUCTOR_E2E == '1' }}
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build konductor binary
        run: cargo build --release
        working-directory: konductor-cli

      - name: Run ACP E2E tests
        env:
          KONDUCTOR_E2E: "1"
          KONDUCTOR_TIMEOUT: "300"
        run: cargo test
        working-directory: tests/acp-harness
