name: Build Release Binaries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: konductor-hook-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: konductor-hook-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: konductor-hook-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: konductor-hook-macos-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: konductor-hook

      - name: Upload binary to release
        uses: svenstaro/upload-release-action@v2
        with:
          file: konductor-hook/target/${{ matrix.target }}/release/konductor-hook
          asset_name: ${{ matrix.name }}
          tag: ${{ github.ref }}
