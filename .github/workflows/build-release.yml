name: Build Release Binaries

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test
        working-directory: konductor-cli

      - name: Run clippy
        run: cargo clippy -- -D warnings
        working-directory: konductor-cli

  build:
    needs: test
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: konductor-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: konductor-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: konductor-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: konductor-macos-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: konductor-cli

      - name: Generate checksum
        run: |
          cd konductor-cli/target/${{ matrix.target }}/release
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum konductor > ${{ matrix.name }}.sha256
          else
            shasum -a 256 konductor > ${{ matrix.name }}.sha256
          fi
          # Rewrite filename in checksum file to match asset name
          sed -i.bak "s|konductor|${{ matrix.name }}|" ${{ matrix.name }}.sha256 || true
          rm -f ${{ matrix.name }}.sha256.bak

      - name: Upload binary to release
        uses: svenstaro/upload-release-action@v2
        with:
          file: konductor-cli/target/${{ matrix.target }}/release/konductor
          asset_name: ${{ matrix.name }}
          tag: ${{ github.event.release.tag_name }}

      - name: Upload checksum to release
        uses: svenstaro/upload-release-action@v2
        with:
          file: konductor-cli/target/${{ matrix.target }}/release/${{ matrix.name }}.sha256
          asset_name: ${{ matrix.name }}.sha256
          tag: ${{ github.event.release.tag_name }}
